<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống Academic-Management — Danh mục màn hình</title>
<style>
:root{
  --header-blue:#1677ff;
  --header-blue-dark:#0d1b2a;
  --bg:#f5f5f5;
  --white:#fff;
  --border:#eee;
  --text-1:#262626;
  --text-3:#8c8c8c;
  --radius:8px;
}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text-1)}
.topbar{height:8px;background:var(--header-blue-dark)}
.header{background:var(--header-blue);color:#fff;padding:28px 40px 24px}
.header h1{margin:0 0 4px;font-size:26px;font-weight:700}
.header p{margin:0;font-size:13px;opacity:.85}
.content{padding:32px 40px 60px}
.group{margin-bottom:32px}
.group-label{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--text-3);margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.card{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-decoration:none;color:inherit;transition:box-shadow .15s,transform .15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.card.disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.badge{width:38px;height:38px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.card-title{font-size:14px;font-weight:600;color:var(--text-1);margin-bottom:2px}
.card-code{font-size:12px;color:var(--text-3)}
/* badge colors by role */
.badge-admin{background:#fff7e6;color:#d46b08}
.badge-kcm{background:#e6f4ff;color:#0958d9}
.badge-gv{background:#f9f0ff;color:#531dab}
.badge-sv{background:#fff2e8;color:#d4380d}
.empty-note{font-size:12px;color:var(--text-3);padding:16px;background:var(--white);border:1px dashed var(--border);border-radius:var(--radius)}
</style>
</head>
<body>
<div class="topbar"></div>
<div class="header">
  <h1>Hệ thống Academic-Management</h1>
  <p>Danh mục màn hình mockup — nhấn vào từng card để xem chi tiết</p>
</div>

<div class="content">

  <div class="group">
    <div class="group-label">QUẢN TRỊ HỆ THỐNG (ADMIN)</div>
    <div class="grid">
      <a class="card" href="mh-admin-01_processmanagement.html">
        <div class="badge badge-admin">AD</div>
        <div>
          <div class="card-title">Quản lý Quy trình</div>
          <div class="card-code">MH-ADMIN-01</div>
        </div>
      </a>
      <a class="card" href="mh-admin-02_formcatalogmanagement.html">
        <div class="badge badge-admin">AD</div>
        <div>
          <div class="card-title">Danh mục Biểu mẫu</div>
          <div class="card-code">MH-ADMIN-02</div>
        </div>
      </a>
    </div>
  </div>

</div>
</body>
</html>
